name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git unzip autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential zlib1g-dev

    - name: Install python-for-android and dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install "sh<2.0,>=1.10"
        pip install python-for-android==2024.1.21
        pip install kivy==2.3.0
        pip install python-dateutil==2.8.2
        pip install plyer==2.1.0

    - name: Download Android SDK and NDK
      run: |
        source venv/bin/activate
        mkdir -p android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp
        mv /tmp/cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
        
        # Accept licenses and install components
        yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses
        sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        # Download NDK
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip

    - name: Build APK with python-for-android
      run: |
        source venv/bin/activate
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        export ANDROID_NDK_ROOT=$PWD/android-ndk-r25b
        
        p4a apk \
          --package org.emotionmapper.app \
          --name "Emotion Mapper" \
          --version 1.0.0 \
          --orientation portrait \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission READ_EXTERNAL_STORAGE \
          --arch arm64-v8a \
          --api 33 \
          --min-api 21 \
          --requirements python3,kivy==2.3.0,python-dateutil==2.8.2,plyer,sqlite3 \
          --private . \
          --dist-name emotion_mapper
      env:
        ANDROID_ACCEPT_SDK_LICENSE: True

    - name: Upload APK
      if: always( )
      uses: actions/upload-artifact@v4
      with:
        name: emotion-mapper-apk
        path: "*.apk"
        if-no-files-found: error

